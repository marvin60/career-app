<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f4f3ff;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 3rem 1rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a1a2e;
    }

    header p {
      margin-top: 0.5rem;
      color: #6b6b8a;
      font-size: 0.9rem;
    }

    #chat-container {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 200px;
    }

    .message {
      padding: 0.85rem 1.1rem;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      max-width: 82%;
      word-break: break-word;
    }

    .message.user {
      background: #7c6ff7;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
    }

    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      background: #fff;
      border: 1.5px solid #ddd8ff;
      border-radius: 16px;
      padding: 0.6rem 0.6rem 0.6rem 1rem;
      box-shadow: 0 2px 8px rgba(124, 111, 247, 0.08);
      transition: border-color 0.15s;
    }

    #input-area:focus-within {
      border-color: #7c6ff7;
    }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      resize: none;
      background: transparent;
      line-height: 1.5;
      max-height: 120px;
    }

    #user-input::placeholder {
      color: #a8a8c0;
    }

    #send-btn {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      background: #7c6ff7;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover {
      background: #6a5de8;
    }

    #send-btn:active {
      transform: scale(0.94);
    }

    #send-btn:disabled {
      background: #c4c0f0;
      cursor: not-allowed;
      transform: none;
    }

    #send-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <header>
    <h1>What are you figuring out?</h1>
    <p>Describe what you're stuck on and we'll work through it together.</p>
  </header>

  <div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
      <textarea
        id="user-input"
        rows="2"
        placeholder="I don't know what to do with my life..."
      ></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
