<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Guide</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(167, 139, 250, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(196, 181, 253, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 10%, rgba(147, 197, 253, 0.25) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 85%, rgba(221, 214, 254, 0.3) 0%, transparent 45%),
        #f7f5ff;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 3rem 1rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a1a2e;
    }

    header p {
      margin-top: 0.5rem;
      color: #6b6b8a;
      font-size: 0.9rem;
    }

    #chat-container {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 200px;
    }

    .message {
      padding: 0.85rem 1.1rem;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      max-width: 82%;
      word-break: break-word;
    }

    .message.user {
      background: #7c6ff7;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
    }

    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      background: #fff;
      border: 1.5px solid #ddd8ff;
      border-radius: 16px;
      padding: 0.6rem 0.6rem 0.6rem 1rem;
      box-shadow: 0 2px 8px rgba(124, 111, 247, 0.08);
      transition: border-color 0.15s;
    }

    #input-area:focus-within {
      border-color: #7c6ff7;
    }

    #user-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
      font-family: inherit;
      color: #1a1a2e;
      resize: none;
      background: transparent;
      line-height: 1.5;
      max-height: 120px;
    }

    #user-input::placeholder {
      color: #8f8faf;
    }

    #prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .prompt-chip {
      background: #fff;
      border: 1.5px solid #ddd8ff;
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-family: inherit;
      color: #5a50d6;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .prompt-chip:hover {
      background: #f0eeff;
      border-color: #7c6ff7;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message {
      animation: fadeUp 0.2s ease;
    }

    .typing {
      display: none;
      align-self: flex-start;
      background: #fff;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
      padding: 0.85rem 1.1rem;
      gap: 5px;
      align-items: center;
    }

    .typing.visible {
      display: flex;
    }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #c4c0f0;
      border-radius: 50%;
      animation: bounce 1.1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }

    #restart-btn {
      display: none;
      align-self: center;
      background: none;
      border: none;
      color: #a0a0bf;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      transition: color 0.15s;
    }

    #restart-btn:hover {
      color: #5a50d6;
    }

    #restart-btn.visible {
      display: block;
    }

    @media (max-width: 480px) {
      body {
        padding: 1.5rem 0.75rem 1rem;
      }
      header h1 {
        font-size: 1.4rem;
      }
      .message {
        max-width: 92%;
      }
      #input-area {
        border-radius: 12px;
      }
    }

    #send-btn {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      background: #7c6ff7;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover {
      background: #6a5de8;
    }

    #send-btn:active {
      transform: scale(0.94);
    }

    #send-btn:disabled {
      background: #c4c0f0;
      cursor: not-allowed;
      transform: none;
    }

    #send-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <header>
    <h1>What are you figuring out?</h1>
    <p>Describe what you're stuck on and we'll work through it together.</p>
  </header>

  <div id="chat-container">
    <div id="messages">
      <div class="typing" id="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="prompts">
      <button class="prompt-chip" onclick="fillPrompt(this)">I don't know what job I want</button>
      <button class="prompt-chip" onclick="fillPrompt(this)">I'm stuck between two paths</button>
      <button class="prompt-chip" onclick="fillPrompt(this)">I don't know what I'm good at</button>
    </div>
    <div id="input-area">
      <textarea
        id="user-input"
        rows="2"
        placeholder="What are you trying to figure out?"
      ></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <button id="restart-btn">↺ Start over</button>
  </div>

  <script>
    function fillPrompt(btn) {
      const input = document.getElementById('user-input');
      input.value = btn.textContent;
      input.focus();
      document.getElementById('prompts').style.display = 'none';
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
