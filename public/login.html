<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Career Guide</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(167, 139, 250, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(196, 181, 253, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 10%, rgba(147, 197, 253, 0.25) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 85%, rgba(221, 214, 254, 0.3) 0%, transparent 45%),
        #f7f5ff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.75rem 2.25rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(124, 111, 247, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      text-align: center;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: #7c6ff7;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .logo svg {
      width: 22px;
      height: 22px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b6b8a;
      margin-bottom: 0.75rem;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.75rem 1rem;
      background: #fff;
      border: 1.5px solid #ddd8ff;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a2e;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .google-btn:hover {
      background: #f9f8ff;
      border-color: #7c6ff7;
      box-shadow: 0 2px 8px rgba(124, 111, 247, 0.12);
    }

    .google-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .fine-print {
      font-size: 0.75rem;
      color: #a0a0bf;
      margin-top: 0.5rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <h1>Career Guide</h1>
    <p class="subtitle">Sign in to start working through what's on your mind.</p>

    <a href="/auth/google" class="google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <p class="fine-print">We only ask for your name and email.<br/>Nothing is posted anywhere.</p>
  </div>
</body>
</html>
